<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="eDoc Generator" />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="assets/logo.png" />
  <link rel="apple-touch-icon" href="assets/logo.png" />
  <title>eDocument Generator | NewTech Home Solutions</title>
  <!-- Self-hosted fonts - no internet needed -->
  <link rel="stylesheet" href="assets/fonts/inter.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <img src="assets/logo.png" alt="NewTech Home Solutions" />
        <div>
          <strong>NewTech</strong>
          <span>eDocument Generator</span>
        </div>
      </div>
      <nav class="nav" aria-label="Document sections">
        <button class="nav-btn active" data-tab="quotations" type="button">Quotations</button>
        <button class="nav-btn" data-tab="invoices" type="button">Tax Invoices</button>
        <button class="nav-btn" data-tab="warrantyCards" type="button">Warranty Cards</button>
      </nav>
      <div class="transfer-pills">
        <button class="pill-btn" id="exportBtn" type="button">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <label class="pill-btn file-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          Import
          <input id="importInput" type="file" accept="application/json,.json" />
        </label>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Standalone Project</p>
          <h1 id="pageTitle">Document Generator</h1>
        </div>
        <div class="top-actions">
          <button class="btn btn-secondary" id="backBtn" type="button" hidden>Back</button>
          <button class="btn btn-primary" id="newBtn" type="button">New Quotation</button>
        </div>
      </header>

      <section id="content" class="content" aria-live="polite"></section>
    </main>
  </div>

  <div class="toast-wrap" id="toastWrap" aria-live="polite"></div>

  <!-- jsPDF - Self-hosted for offline use -->
  <script src="libs/jspdf.umd.min.js"></script>
  <script src="libs/jspdf.plugin.autotable.min.js"></script>
  <script src="offline-indicator.js"></script>
  <script src="app.js"></script>
</body>
</html>
